name: Docker image

# Build-only for now. When the repo is public and the image should be published
# to ghcr.io/8tp/palhelm, uncomment the login step and the push settings below.

on:
  push:
    branches: [main]
    # tags: ["v*"]
  pull_request:

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    # permissions:
    #   contents: read
    #   packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Read panel version
        id: panel-version
        shell: bash
        run: echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      # - name: Log in to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ghcr.io/8tp/palhelm:ci
          build-args: |
            VERSION=${{ steps.panel-version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # To publish instead, replace `push: false` and `tags` above with:
          # push: ${{ github.event_name != 'pull_request' }}
          # tags: |
          #   ghcr.io/8tp/palhelm:latest
          #   ghcr.io/8tp/palhelm:${{ github.ref_name }}
