<!-- Palhelm v3 "sphere-wheel" favicon (design/mark-v3-sphere-wheel.md): helm ring + 8 ticks
     + diagonal split, capture-sphere green half, MINUS the diamond window (it muddies below
     20px). Colors baked static since a favicon document has no access to the app tokens. -->
<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 26 26" fill="none">
  <style>
    .sphere { fill: #63ad50; }
    .split, .ring, .ticks { stroke: #55682b; }
    @media (prefers-color-scheme: dark) {
      .split, .ring, .ticks { stroke: #93a653; }
    }
  </style>
  <path class="sphere" d="M6.99 19.01 A8.5 8.5 0 1 1 19.01 6.99 Z"/>
  <path class="split" d="M6.99 19.01 L19.01 6.99" stroke-width="2" stroke-linecap="round"/>
  <circle class="ring" cx="13" cy="13" r="8.5" stroke-width="2"/>
  <g class="ticks" stroke-width="2" stroke-linecap="round">
    <path d="M13 1.5v4"/><path d="M13 20.5v4"/>
    <path d="M1.5 13h4"/><path d="M20.5 13h4"/>
    <path d="M4.87 4.87l2.83 2.83"/><path d="M18.3 18.3l2.83 2.83"/>
    <path d="M21.13 4.87l-2.83 2.83"/><path d="M7.7 18.3l-2.83 2.83"/>
  </g>
</svg>
